<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SMS Test UI</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 480px;
      margin: 40px auto;
      padding: 24px;
      border: 1px solid #ddd;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      font-size: 16px;
    }
    button {
      cursor: pointer;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
    }
    .result {
      margin-top: 16px;
      padding: 10px;
      border-radius: 6px;
      background: #f3f4f6;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h2>SMS Test UI</h2>
  <label for="number">Phone Number</label>
  <input id="number" placeholder="e.g. +251914558019" />
  <button onclick="sendTest()">Send Test SMS</button>
  <div id="result" class="result">Waiting for input...</div>

  <script>
    async function sendTest() {
      const number = document.getElementById('number').value.trim();
      const resultBox = document.getElementById('result');

      if (!number) {
        resultBox.textContent = 'Please enter a phone number.';
        return;
      }

      resultBox.textContent = 'Sending...';

      try {
        const response = await fetch('/send-sms', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            destinationAddr: number,
            shortMessage: 'Hello from SMS test UI'
          })
        });

        const data = await response.json();
        resultBox.textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        resultBox.textContent = 'Request failed: ' + error.message;
      }
    }
  </script>
</body>
</html>
